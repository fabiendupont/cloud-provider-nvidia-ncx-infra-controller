apiVersion: apps/v1
kind: Deployment
metadata:
  name: nico-cloud-controller-manager
  namespace: kube-system
  labels:
    app: nico-cloud-controller-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nico-cloud-controller-manager
  template:
    metadata:
      labels:
        app: nico-cloud-controller-manager
    spec:
      serviceAccountName: nico-cloud-controller-manager
      hostNetwork: true
      containers:
        - name: cloud-controller-manager
          image: ghcr.io/fabiendupont/cloud-provider-nvidia-ncx-infra-controller:latest
          imagePullPolicy: IfNotPresent
          command:
            - /nico-cloud-controller-manager
            - --cloud-provider=nico
            - --cloud-config=/etc/kubernetes/cloud-config
            - --use-service-account-credentials=true
            - --leader-elect=true
            - --leader-elect-resource-name=nico-cloud-controller-manager
            - --v=2
          volumeMounts:
            - name: cloud-config
              mountPath: /etc/kubernetes
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 10258
              scheme: HTTPS
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
      volumes:
        - name: cloud-config
          secret:
            secretName: nico-cloud-config
            items:
              - key: cloud-config
                path: cloud-config
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
        - key: node.cloudprovider.kubernetes.io/uninitialized
          operator: Exists
          effect: NoSchedule
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""
